<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Realms View</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/poi-icons.css">
</head>
<body>
  <div id="app"></div>

  <script>
    (function () {
      var scripts = [
        "data/app-config.js",
        "data/maps.js",
        "data/layers.js",
        "data/poi-types.js",
        "data/pois.js",
        "data/poi-links.js",
        "js/app.js"
      ];
      var currentScript = null;
      var bootFailed = false;

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderBootError(title, detail, scriptPath) {
        var app = document.getElementById("app");
        if (!app || bootFailed) {
          return;
        }

        bootFailed = true;
        app.innerHTML =
          '<main class="boot-error-screen">' +
            '<section class="boot-error-card">' +
              '<div class="boot-error-code">DATA ERROR</div>' +
              '<h1 class="boot-error-title">' + escapeHtml(title) + '</h1>' +
              '<p class="boot-error-copy">The viewer could not load because one of the local data or app files has a problem.</p>' +
              (scriptPath
                ? '<p class="boot-error-detail"><strong>Likely file:</strong> ' + escapeHtml(scriptPath) + '</p>'
                : "") +
              (detail
                ? '<pre class="boot-error-message">' + escapeHtml(detail) + '</pre>'
                : "") +
            '</section>' +
          '</main>';
      }

      window.addEventListener("error", function (event) {
        if (!bootFailed) {
          renderBootError(
            "Failed to initialize map viewer",
            event.message || "Unknown startup error.",
            currentScript || event.filename || ""
          );
        }
      });

      function loadScript(index) {
        if (index >= scripts.length || bootFailed) {
          return;
        }

        currentScript = scripts[index];

        var script = document.createElement("script");
        script.src = currentScript;
        script.async = false;
        script.onload = function () {
          loadScript(index + 1);
        };
        script.onerror = function () {
          renderBootError(
            "Failed to load required file",
            "The file could not be loaded by the browser.",
            currentScript
          );
        };

        document.body.appendChild(script);
      }

      loadScript(0);
    })();
  </script>
</body>
</html>
